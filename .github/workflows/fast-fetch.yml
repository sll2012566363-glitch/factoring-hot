name: Fast Fetch (every 10min)

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟
  workflow_dispatch:       # 手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # 2026-07-14: fetch-sources.ts 内 isRelevant() 已改并发（同信源批次内
      # Promise.all，不再逐篇 await），本地测试 10 篇里 8 篇过 LLM 只要
      # 11 秒（顺序模式要 40-80 秒）。作为 10 分钟预算最紧的一条路径先在
      # 这里验证——过了说明 hourly（35分钟预算）肯定也没问题。
      - name: Fast fetch (articles only, no scoring)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          RELEVANCE_LLM_ENABLED: 'true'
        run: npx tsx src/scripts/run-pipeline.ts --fetch-only
