name: Reports (Daily + Weekly, 8AM Beijing)

on:
  # 报告必须在全链路完成后再生成，否则会读取到尚未评分的旧数据。
  workflow_run:
    workflows: ["Pipeline (fetch → pre-filter → enrich → score → cluster)"]
    types: [completed]
  workflow_dispatch:

jobs:
  report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily report
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: npx tsx src/scripts/generate-reports.ts daily

      # 按当前 ISO 周重新生成，upsert on (year, week_number)：
      # 一周内每天刷新一次，数据随文章增长而更新，周末即为定稿
      - name: Generate weekly report
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: npx tsx src/scripts/generate-reports.ts weekly
